<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="google.css">
</head>
<body>

  <div class="container">

    <div class="form-card">

    <!-- Success Screen (hidden by default) -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✓</div>
  <h2>Account Created!</h2>
  <p>Welcome to Google, <span id="welcomeName"></span> 👋</p>
  <button onclick="resetAll()">Back to Sign Up</button>
</div>  

      <!-- Logo & Heading -->
      <div class="form-header">
  <!-- Google Logo -->
  <svg xmlns="http://www.w3.org/2000/svg" width="75" height="24" viewBox="0 0 75 24">
    <text x="0" y="22" font-size="24" font-family="Arial" font-weight="bold">
      <tspan fill="#4285F4">G</tspan><tspan fill="#EA4335">o</tspan><tspan fill="#FBBC05">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan>
    </text>
  </svg>
  <h1>Create account</h1>
  <p>to continue to Google</p>
</div>

      <!-- Form -->
      <form id="registerForm" novalidate>

        <!-- Name Row -->
        <div class="form-row">
          <div class="form-group">
            <input type="text" id="firstName" placeholder=" " required>
            <label for="firstName">First name</label>
          </div>
          <div class="form-group">
            <input type="text" id="lastName" placeholder=" " required>
            <label for="lastName">Last name</label>
          </div>
        </div>

        <!-- Username -->
        <div class="form-group">
          <input type="text" id="username" placeholder=" " required>
          <label for="username">Username</label>
          <span class="hint">@gmail.com</span>
        </div>

        
        <!-- Password Row -->
<div class="form-row">
  <div class="form-group">
    <input type="password" id="password" placeholder=" " required>
    <label for="password">Password</label>
    <span class="toggle-eye" onclick="togglePassword('password', this)">👁️</span>
  </div>
  <div class="form-group">
    <input type="password" id="confirmPassword" placeholder=" " required>
    <label for="confirmPassword">Confirm</label>
    <span class="toggle-eye" onclick="togglePassword('confirmPassword', this)">👁️</span>
  </div>
</div>

        <!-- Error Message -->
        <p class="error-msg" id="errorMsg"></p>

        <!-- Buttons -->
        <div class="form-actions">
          <a href="#">Sign in instead</a>
          <button type="submit">Next</button>
        </div>

      </form>

    </div>

    <!-- Side Illustration -->
    <div class="form-illustration">
      <img src="https://ssl.gstatic.com/accounts/ui/avatar_2x.png" alt="avatar">
      <p>One account.<br>All of Google.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
